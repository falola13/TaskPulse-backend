services:
  postgres:
    image: postgres:14
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskpulse_dev
    # Host 5433 avoids clashing with a local Windows PostgreSQL on 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nest-net

networks:
  nest-net:

volumes:
  pgdata:
